name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies & sync Capacitor
        run: npm ci && npx cap sync ios

      - name: Inject GoogleService-Info.plist
        run: |
          echo "${{ secrets.GOOGLE_SERVICE_INFO_PLIST_BASE64 }}" | base64 --decode > ios/App/App/GoogleService-Info.plist

      - name: Resolve SPM dependencies
        run: |
          cd ios/App
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme App \
            -clonedSourcePackagesDirPath ./SourcePackages

      - name: Build archive (unsigned)
        run: |
          cd ios/App
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/zman.xcarchive \
            -clonedSourcePackagesDirPath ./SourcePackages \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Package IPA
        run: |
          mkdir -p /tmp/Payload
          cp -r "$RUNNER_TEMP/zman.xcarchive/Products/Applications/App.app" /tmp/Payload/
          cd /tmp
          zip -r zman.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: zman-ios
          path: /tmp/zman.ipa
          retention-days: 7
